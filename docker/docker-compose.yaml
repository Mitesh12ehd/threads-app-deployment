services:
  thread-app:
    image: thread-app:2.0
    ports:
      - 3000:3000
    environment:
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NEXT_CLERK_WEBHOOK_SECRET=${NEXT_CLERK_WEBHOOK_SECRET}
      - MONGODB_URL=${MONGODB_URL}